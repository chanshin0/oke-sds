<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Phase 2 로드맵 4단계</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title {
  font-size: 48px; font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center; margin-bottom: 60px; line-height: 1.3;
}

.progress-section { text-align: center; width: 100%; }
.progress-label { font-size: 16px; color: #8b949e; margin-bottom: 28px; }
.progress-bar { display: flex; gap: 10px; justify-content: center; align-items: center; }
.progress-segment { width: 240px; height: 14px; border-radius: 7px; }
.progress-segment.filled {
  background: linear-gradient(90deg, #7c3aed, #a78bfa);
  box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
}
.progress-labels { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
.progress-labels .seg-label { width: 240px; text-align: center; }
.seg-label .seg-num { font-size: 14px; color: #8b949e; font-weight: 700; }
.seg-label .seg-name { font-size: 16px; color: #e6edf3; font-weight: 700; margin-top: 4px; }
.seg-label .seg-desc { font-size: 12px; color: #8b949e; margin-top: 6px; line-height: 1.5; }

.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }

body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <h1 class="title">Phase 2 로드맵 — 4단계</h1>
  <div class="progress-section">
    <div class="progress-label">정적 정리 → 동적 보강 → 모듈 분리 순서</div>
    <div class="progress-bar">
      <div class="progress-segment filled"></div>
      <div class="progress-segment filled"></div>
      <div class="progress-segment filled"></div>
      <div class="progress-segment filled"></div>
    </div>
    <div class="progress-labels">
      <div class="seg-label">
        <div class="seg-num">2.1</div>
        <div class="seg-name">식별자 치환</div>
        <div class="seg-desc">8 파일 placeholder 화</div>
      </div>
      <div class="seg-label">
        <div class="seg-num">2.2</div>
        <div class="seg-name">CHANGELOG 삭제</div>
        <div class="seg-desc">디버깅 history 정리</div>
      </div>
      <div class="seg-label">
        <div class="seg-num">2.3</div>
        <div class="seg-name">remote 보강</div>
        <div class="seg-desc">install 시 정확한 등록</div>
      </div>
      <div class="seg-label">
        <div class="seg-num">2.4</div>
        <div class="seg-name">주간보고 분리</div>
        <div class="seg-desc">별도 plugin 으로</div>
      </div>
    </div>
  </div>
</div>

<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="02-starting-point.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">03 / 10</a></div>
    <div class="nav-right"><a href="04-replace-identifiers.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>

<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('02-starting-point.html');
  if (e.key === 'ArrowRight') navigateTo('04-replace-identifiers.html');
});
</script>
</body>
</html>
