<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>2.2 CHANGELOG 삭제 결정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title { font-size: 44px; font-weight: 900; background: linear-gradient(135deg, #7c3aed, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; margin-bottom: 36px; line-height: 1.3; }

.cards { display: flex; gap: 32px; margin-bottom: 30px; width: 100%; }
.card { flex: 1; background: linear-gradient(145deg, rgba(124, 58, 237, 0.1), rgba(56, 189, 248, 0.05)); border: 1px solid rgba(124, 58, 237, 0.25); border-radius: 20px; padding: 36px 28px; text-align: center; position: relative; overflow: hidden; opacity: 0; transform: translateY(30px); animation: cardAppear 0.6s ease-out forwards; }
.card:nth-child(1) { animation-delay: 0.2s; }
.card:nth-child(2) { animation-delay: 0.6s; }
@keyframes cardAppear { to { opacity: 1; transform: translateY(0); } }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #7c3aed, #38bdf8); }
.card-icon { font-size: 44px; margin-bottom: 16px; display: block; position: relative; z-index: 1; }
.card-text { font-size: 16px; font-weight: 500; line-height: 1.7; color: #c9d1d9; position: relative; z-index: 1; }
.card-label { display: inline-block; margin-top: 14px; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; position: relative; z-index: 1; background: rgba(124, 58, 237, 0.2); color: #a78bfa; }

.note { max-width: 900px; padding: 20px 28px; background: rgba(22, 27, 40, 0.6); border: 1px solid rgba(124, 58, 237, 0.2); border-radius: 12px; font-size: 15px; color: #8b949e; line-height: 1.7; text-align: center; }

.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }

body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <h1 class="title">2.2 CHANGELOG 삭제</h1>
  <div class="cards">
    <div class="card">
      <span class="card-icon">🗑️</span>
      <p class="card-text">CHANGELOG.md 안에 SDS305 / SDS306 다중 remote 디버깅 history 등 회사 인프라 컨텍스트 잔존</p>
      <span class="card-label">문제</span>
    </div>
    <div class="card">
      <span class="card-icon">🆕</span>
      <p class="card-text">파일 자체 삭제 → 향후 generic 변경 이력은 새로 시작. plugin.json 의 version 필드로 충분</p>
      <span class="card-label">결정</span>
    </div>
  </div>
  <div class="note">
    redact 보다 삭제가 단순. 어차피 git history 에 옛 회사 컨텍스트는 남지만, 현재 plugin tree 에서는 사라짐.
  </div>
</div>

<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="04-replace-identifiers.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">05 / 10</a></div>
    <div class="nav-right"><a href="06-remote-management.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>

<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('04-replace-identifiers.html');
  if (e.key === 'ArrowRight') navigateTo('06-remote-management.html');
});
</script>
</body>
</html>
