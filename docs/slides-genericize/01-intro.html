<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>sds-workflow 제네릭화 — 왜?</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding-bottom: 50px;
}
.container {
  width: 1280px;
  padding: 44px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.title {
  font-size: 48px;
  font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  margin-bottom: 18px;
  line-height: 1.3;
}
.subtitle {
  font-size: 18px;
  color: #8b949e;
  margin-bottom: 44px;
  text-align: center;
}

.cards {
  display: flex;
  gap: 32px;
  margin-bottom: 40px;
  width: 100%;
}
.card {
  flex: 1;
  background: linear-gradient(145deg, rgba(124, 58, 237, 0.1), rgba(56, 189, 248, 0.05));
  border: 1px solid rgba(124, 58, 237, 0.25);
  border-radius: 20px;
  padding: 40px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(30px);
  animation: cardAppear 0.6s ease-out forwards;
}
.card:nth-child(1) { animation-delay: 0.2s; }
.card:nth-child(2) { animation-delay: 0.6s; }
.card:nth-child(3) { animation-delay: 1.0s; }
@keyframes cardAppear {
  to { opacity: 1; transform: translateY(0); }
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #7c3aed, #38bdf8);
}
.card-icon { font-size: 48px; margin-bottom: 20px; display: block; position: relative; z-index: 1; }
.card-text { font-size: 17px; font-weight: 500; line-height: 1.7; color: #c9d1d9; position: relative; z-index: 1; }
.card-label {
  display: inline-block; margin-top: 14px; padding: 4px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700; position: relative; z-index: 1;
  background: rgba(124, 58, 237, 0.2); color: #a78bfa;
}

.slide-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
  background: rgba(10, 15, 26, 0.95);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(124, 58, 237, 0.2);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; font-family: 'Noto Sans KR', sans-serif;
}
.slide-nav-inner {
  width: 1280px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 60px;
}
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }

body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <h1 class="title">sds-workflow 제네릭화</h1>
  <p class="subtitle">회사 의존 plugin → 어디서나 쓸 수 있는 일반 도구로</p>
  <div class="cards">
    <div class="card">
      <span class="card-icon">🔒</span>
      <p class="card-text">회사 GitLab URL · 프로젝트 경로 · Jira 키 prefix 가 코드에 박혀 있어 외부 노출 불가</p>
      <span class="card-label">출발 문제</span>
    </div>
    <div class="card">
      <span class="card-icon">♻️</span>
      <p class="card-text">다른 저장소 · 다른 팀에서도 동일 워크플로우 재사용 가능하게</p>
      <span class="card-label">목표</span>
    </div>
    <div class="card">
      <span class="card-icon">🌍</span>
      <p class="card-text">민감정보는 consumer repo 의 <code>.team-workflow/workflow.yml</code> 에만 두고 plugin 은 OSS 화 가능</p>
      <span class="card-label">결과</span>
    </div>
  </div>
</div>

<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><span class="nav-disabled">&larr; 이전</span></div>
    <div class="nav-center"><a href="index.html">01 / 10</a></div>
    <div class="nav-right"><a href="02-starting-point.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>

<script>
function navigateTo(url) {
  document.body.classList.add('fade-out');
  setTimeout(function() { window.location.href = url; }, 300);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') navigateTo('02-starting-point.html');
});
</script>
</body>
</html>
