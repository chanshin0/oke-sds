# 저장소별 sds-workflow override
# 플러그인 `workflow/config.defaults.yml` 과 deep-merge 된다.
# /init 가 이 파일을 생성하며 AskUserQuestion 으로 값을 채운다.

jira:
  # 필수 — 이 저장소에서 다룰 Jira 프로젝트 키 목록.
  # array 형태. 단일이어도 array (예: ["CDS"]).
  # 비우거나 ["*"] 면 모든 uppercase prefix 허용 (느슨 검증).
  # 팀 기본: ["CDS", "CEPH"]
  project_keys: {{PROJECT_KEYS_JSON}}
  # 필수 — Atlassian site URL (팀 기본: https://okestro.atlassian.net)
  base_url: "{{JIRA_BASE_URL}}"

gitlab:
  # 선택 — MR 대상 GitLab 프로젝트 고정용. 다중 remote 환경에서 glab 이 엉뚱한
  # 프로젝트를 선택하는 문제 방지. 비우면 create-mr.sh 가 `remote-sds` URL 에서 파싱.
  # /sds-workflow:init Phase 2.0 이 origin URL 에서 자동 추출.
  base_url: "{{GITLAB_BASE_URL}}"
  project_path: "{{GITLAB_PROJECT_PATH}}"

# confluence: 섹션은 weekly-report 플러그인 전용 — `/sds-workflow:weekly-report-init`
# 가 자체적으로 추가/관리한다. sds-workflow:init 은 이 섹션을 만들지 않는다.

federation:
  # 선택 — Module Federation 등 host 계약면 파일 목록 (저장소별)
  # 없으면 비워두면 됨. /pick Phase 2.5 기능개요 브리핑 시 참고.
  contract_surface: []
